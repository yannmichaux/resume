name: Build and deploy resume

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      RESUME_PUPPETEER_NO_SANDBOX: "1"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install resume-cli
        run: npm install -g resume-cli

      - name: Install project dependencies
        run: npm install

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Split i18n source
        run: npm run split

      - name: Build public site
        run: npm run build -- --preset public

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: pdf/

      - name: Upload Github Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5

      - name: Log deploy URL
        run: |
          echo "::notice::Site https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
